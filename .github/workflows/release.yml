name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  changesets:
    runs-on: self-hosted
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      api_version: ${{ steps.versions.outputs.api }}
      web_version: ${{ steps.versions.outputs.web }}
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ steps.bot-token.outputs.token }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: echo "skip-publish"
          version: bun run version
          createGithubReleases: false
          commitMode: git-cli
        env:
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}

      - name: Check if deploy needed
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" == "Version Packages"* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract versions
        id: versions
        if: steps.check.outputs.is_release == 'true'
        run: |
          echo "api=$(node -p "require('./apps/api/package.json').version")" >> $GITHUB_OUTPUT
          echo "web=$(node -p "require('./apps/web/package.json').version")" >> $GITHUB_OUTPUT

  deploy:
    needs: changesets
    if: needs.changesets.outputs.is_release == 'true'
    runs-on: self-hosted
    environment: production
    env:
      API_VERSION: ${{ needs.changesets.outputs.api_version }}
      WEB_VERSION: ${{ needs.changesets.outputs.web_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Backup database
        run: |
          BACKUP_FILE="/opt/ctrlpane/backups/api@v${API_VERSION}-pre-deploy.sql.gz"
          echo "Backing up database to ${BACKUP_FILE}"
          pg_dump -h localhost -p 35432 -U ctrlpane_app ctrlpane | gzip > "${BACKUP_FILE}"
          BACKUP_SIZE=$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || stat -f%z "${BACKUP_FILE}")
          if [ "${BACKUP_SIZE}" -lt 100 ]; then
            echo "::error::Database backup is suspiciously small (${BACKUP_SIZE} bytes). Aborting."
            exit 1
          fi
          echo "Backup complete: ${BACKUP_SIZE} bytes"

      - name: Run migrations
        run: bun run --cwd apps/api db:migrate

      - name: Deploy API
        id: deploy-api
        run: |
          PREV_API=$(readlink -f /opt/ctrlpane/api/current 2>/dev/null || echo "")
          echo "prev_api=${PREV_API}" >> $GITHUB_OUTPUT
          mkdir -p /opt/ctrlpane/api/releases/v${API_VERSION}
          cp -r apps/api/dist/* /opt/ctrlpane/api/releases/v${API_VERSION}/
          ln -sfn releases/v${API_VERSION} /opt/ctrlpane/api/current
          sudo systemctl restart ctrlpane-api

      - name: Health check API
        id: health-api
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:33001/health/ready > /dev/null 2>&1; then
              echo "API healthy after attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}/10: API not ready, waiting 3s..."
            sleep 3
          done
          echo "::error::API health check failed after 10 attempts"
          exit 1

      - name: Rollback API on failure
        if: failure() && steps.deploy-api.outcome == 'success'
        run: |
          PREV_API="${{ steps.deploy-api.outputs.prev_api }}"
          if [ -n "${PREV_API}" ] && [ -d "${PREV_API}" ]; then
            echo "::warning::Rolling back API to ${PREV_API}"
            ln -sfn "${PREV_API}" /opt/ctrlpane/api/current
            sudo systemctl restart ctrlpane-api
            sleep 3
            curl -sf http://localhost:33001/health/ready || echo "::error::Rollback health check also failed"
          else
            echo "::error::No previous API release to rollback to"
          fi

      - name: Deploy Web
        id: deploy-web
        run: |
          PREV_WEB=$(readlink -f /opt/ctrlpane/web/current 2>/dev/null || echo "")
          echo "prev_web=${PREV_WEB}" >> $GITHUB_OUTPUT
          mkdir -p /opt/ctrlpane/web/releases/v${WEB_VERSION}
          cp -r apps/web/dist/* /opt/ctrlpane/web/releases/v${WEB_VERSION}/
          ln -sfn releases/v${WEB_VERSION} /opt/ctrlpane/web/current
          sudo systemctl restart ctrlpane-web

      - name: Health check Web
        id: health-web
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:33000/ > /dev/null 2>&1; then
              echo "Web healthy after attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}/10: Web not ready, waiting 3s..."
            sleep 3
          done
          echo "::error::Web health check failed after 10 attempts"
          exit 1

      - name: Rollback Web on failure
        if: failure() && steps.deploy-web.outcome == 'success'
        run: |
          PREV_WEB="${{ steps.deploy-web.outputs.prev_web }}"
          if [ -n "${PREV_WEB}" ] && [ -d "${PREV_WEB}" ]; then
            echo "::warning::Rolling back Web to ${PREV_WEB}"
            ln -sfn "${PREV_WEB}" /opt/ctrlpane/web/current
            sudo systemctl restart ctrlpane-web
            sleep 3
            curl -sf http://localhost:33000/ || echo "::error::Rollback health check also failed"
          else
            echo "::error::No previous Web release to rollback to"
          fi

      - name: Create Git tag
        if: success()
        run: |
          git tag "v${API_VERSION}" -m "Release v${API_VERSION}"
          git push origin "v${API_VERSION}"
